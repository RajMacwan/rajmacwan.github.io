name: WireGrid Weekly

on:
  schedule:
    # Fridays 14:00 UTC = 10:00 ET — end-of-week breach wrap
    - cron: "0 14 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate this week's WireGrid entry
        run: python automation/weekly_wire.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name "macwangrid-bot"
          git config user.email "bot@macwangrid.com"
          git add wire-grid.html automation/wire_state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "feat(wire): weekly breach log $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new WireGrid entries this week."
          fi
