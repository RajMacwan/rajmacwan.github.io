name: PatchGrid Weekly

on:
  schedule:
    # Wednesdays 16:00 UTC = 12:00 ET — day after Patch Tuesday in the US
    - cron: "0 16 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate this week's PatchGrid digest
        run: python automation/weekly_patch.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name "macwangrid-bot"
          git config user.email "bot@macwangrid.com"
          git add patch-grid.html automation/patch_state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "feat(patch): weekly vendor digest $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new PatchGrid entries this week."
          fi
